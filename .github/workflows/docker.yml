name: Docker Build and Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  server:
    name: Build & Push Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pokemon-mud-server:latest
            ghcr.io/${{ github.repository_owner }}/pokemon-mud-server:${{ github.sha }}

  client:
    name: Build & Push Client Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pokemon-mud-client:latest
            ghcr.io/${{ github.repository_owner }}/pokemon-mud-client:${{ github.sha }}
